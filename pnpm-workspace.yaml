packages:
  - .

strictPeerDependencies: false

overrides:
  "@lint-md/cli": 2.0.0
  "@commitlint/cli>yargs": 18.0.0
  "@types/methods": ^1.1.4
  "@types/superagent": ^8.1.0
  axios: $axios
  compare-func: $compare-func
  cron: $cron
  formidable: ^3.2.4
  tough-cookie: ^4.1.3
  path-to-regexp: ^3.3.0
  nodemailer: ^8.0.9
  html-minifier: npm:html-minifier-terser@^7.2.0
  request: npm:postman-request@^2.88.1-postman.31
  nth-check: ^2.1.1
  cookie: ^0.7.0
  katex: ^0.16.21
  "@sentry/node": ^8.49.0
  esbuild: ^0.28.1
  "@octokit/plugin-paginate-rest": ^11.4.1
  "@octokit/request": ^9.2.1
  "@octokit/request-error": ^5.1.1
  "@babel/runtime-corejs2": ^7.26.10
  "@babel/core": 7.29.6
  "@babel/helpers": ^7.26.10
  "@babel/runtime-corejs3": ^7.26.10
  tar-fs: ^2.1.4
  tmp: ^0.2.7
  sha.js: ^2.4.12
  vite: ^6.4.3
  "@nestjs/common": ^11.0.11
  multer: 2.1.1
  brace-expansion: ^2.0.3
  form-data: ^4.0.6
  js-yaml: ^4.2.0
  mdast-util-to-hast: ^13.2.1
  fast-uri: 3.1.2
  fast-xml-builder: 1.1.7
  fast-xml-parser: ^5.7.0
  flatted: 3.4.2
  ip-address: 10.1.1
  jws: ^3.2.3
  lodash: 4.18.1
  lodash-es: 4.18.1
  minimatch@3: 3.1.4
  minimatch@9: 9.0.7
  picomatch@2: 2.3.2
  picomatch@4: 4.0.4
  preact: 10.27.3
  qs: 6.15.2
  rollup: 4.59.0
  serialize-javascript: 7.0.5
  undici: 7.24.0
  uuid: 11.1.1
  ws: ^8.21.0
  diff: 4.0.4
  joi: 17.13.4
  webpack: ^5.104.1

peerDependencyRules:
  ignoreMissing:
    - express
    - webpack

allowBuilds:
  "@nestjs/core": true
  "@sentry/profiling-node": true
  "@sentry-internal/node-cpu-profiler": false
  bcrypt: true
  better-sqlite3: true
  core-js: true
  core-js-pure: true
  esbuild: true
  nice-napi: true
  sqlite3: true
  unrs-resolver: true
  '@scarf/scarf': set this to true or false
